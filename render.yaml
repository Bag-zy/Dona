services:
  - type: web
    name: dona-agent
    env: docker
    dockerfilePath: ./agent/Dockerfile
    dockerContext: ./agent
    plan: starter
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: PORT
        value: 8123
